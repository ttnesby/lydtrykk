name: test-build-deploy

# Publisering skjer til gh-pages-branchen (ikke offisiell Pages-deploy), slik
# at hver PR kan få en egen preview i en undermappe. Pages-kilden må derfor
# stå på «Deploy from a branch → gh-pages / (root)» i repo-innstillingene.
#
# - push til main         → bygg + deploy til gh-pages-roten (produksjon)
# - pull_request (åpen)   → bygg + deploy preview til gh-pages/pr-preview/pr-N/
# - pull_request (lukket) → fjern preview-mappa igjen
#
# Endring av kun default-oppsettet trenger ingen ny deploy – appen henter
# frontend/static/default.json live fra GitHub raw ved refresh. Manuell deploy
# (for å oppdatere den bundlede fallback-kopien) via "Run workflow".

on:
  push:
    branches: [main]
    paths-ignore:
      - 'frontend/static/default.json'
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths-ignore:
      - 'frontend/static/default.json'
      - '**/*.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup native GHC
        id: setup
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          cabal-version: "3.12.1.0"

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup.outputs.cabal-store }}
            dist-newstyle
          key: native-${{ runner.os }}-ghc9.6.7-${{ hashFiles('cabal.project', 'lyd-core/lyd-core.cabal') }}
          restore-keys: |
            native-${{ runner.os }}-ghc9.6.7-

      - name: Run tests
        run: cabal test all

  build:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache ghc-wasm-meta toolchain
        id: wasm-toolchain-cache
        uses: actions/cache@v4
        with:
          path: ~/.ghc-wasm
          key: ghc-wasm-9.12-${{ runner.os }}
          restore-keys: |
            ghc-wasm-9.12-${{ runner.os }}-

      - name: Cache wasm build products
        uses: actions/cache@v4
        with:
          path: dist-newstyle
          key: wasm-build-${{ runner.os }}-${{ hashFiles('cabal.project.wasm', 'frontend/frontend.cabal', 'lyd-core/lyd-core.cabal') }}
          restore-keys: |
            wasm-build-${{ runner.os }}-

      - name: Install ghc-wasm-meta (GHC 9.12 flavour)
        run: |
          if [ ! -f "$HOME/.ghc-wasm/env" ]; then
            curl -f -L --retry 5 https://gitlab.haskell.org/haskell-wasm/ghc-wasm-meta/-/raw/master/bootstrap.sh -o /tmp/bootstrap.sh
            FLAVOUR=9.12 sh /tmp/bootstrap.sh
          fi

      - name: Build wasm frontend
        env:
          SKIP_CABAL_UPDATE: ${{ steps.wasm-toolchain-cache.outputs.cache-hit == 'true' && '1' || '0' }}
          WASM_OPT: ${{ github.event_name == 'pull_request' && '0' || '1' }}
        run: ./build.sh

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  # Produksjon: push til main → gh-pages-roten. Beholder eksisterende
  # PR-previews (clean-exclude).
  deploy-main:
    needs: [test, build]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-write
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy to gh-pages (root)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          clean-exclude: pr-preview

  # PR-preview: bygg/oppdater preview i gh-pages/pr-preview/pr-N/ og kommenter
  # PR-en med URL.
  deploy-preview:
    needs: [test, build]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-write
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist
          umbrella-dir: pr-preview

  # Rydd preview-mappa når PR-en lukkes (trenger ikke bygg).
  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-write
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Remove PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          umbrella-dir: pr-preview
          action: auto
