<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Varmepumpe – 3D-visning</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.css" integrity="sha384-K282sW/zFjTkrjR/+yr1H+gCukuy4OEYrkXRybV88g7pk+kZZYpNV6SAV59NcgFg" crossorigin="anonymous">
<style>
  :root{ --ink:#23231f; --muted:#5f5e5a; --line:#e2e0d8; --bg:#faf9f5; --accent:#c0492a; --panel:#ffffff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:var(--bg); }
  #topbar{ position:absolute; top:0; left:0; right:0; z-index:10; background:var(--panel); border-bottom:1px solid var(--line); font-size:13px; }
  #toprow{ display:flex; align-items:center; gap:12px; padding:8px 14px; }
  #topbar h1{ font-size:14px; margin:0; font-weight:600; }
  #topbar a{ color:var(--accent); text-decoration:none; }
  #topbar a:hover{ text-decoration:underline; }
  #melding{ font-size:12.5px; color:var(--muted); }
  #info{ padding:0 14px 8px; font-size:12px; color:var(--muted); }
  #info .sw{ display:inline-block; width:10px; height:10px; border-radius:2px; margin:0 3px 0 10px; vertical-align:middle; }
  #info .sw:first-child{ margin-left:0; }
  #map3d{ position:absolute; inset:0; }
  /* v1 er ren visning – ingen dra/rediger, så feilstaten er en enkel sentrert boks. */
  #feil{ display:none; position:absolute; inset:0; align-items:center; justify-content:center; text-align:center; padding:24px; }
  #feil.vis{ display:flex; }
  #feil .boks{ max-width:360px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:18px 20px; font-size:13.5px; line-height:1.6; }
  .pnum3d{ width:20px; height:20px; border-radius:50%; background:var(--accent); color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; border:1.5px solid #fff; box-shadow:0 0 3px rgba(0,0,0,.4); }
</style>
</head>
<body>
<div id="topbar">
  <div id="toprow">
    <h1>Varmepumpe – 3D-visning</h1>
    <span id="melding"></span>
    <a href="lydnivakart.html" id="tilbake">← Tilbake til kartsimulator</a>
  </div>
  <div id="info"></div>
</div>
<div id="map3d"></div>
<div id="feil">
  <div class="boks">
    <p>Ingen oppsett funnet.</p>
    <p>Åpne <a href="lydnivakart.html">kartsimulatoren</a>, sett opp utedeler/husrekker, og klikk «Åpne i 3D» der.</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.js" integrity="sha384-KKgyz2mG25bKJ1O2PyqTJPlAF8Kw2BpDmsLTNBXslICOBvhTAyF5F0XhLWF2ZovY" crossorigin="anonymous"></script>
<script src="lydnivakart3d.js" type="module"></script>
</body>
</html>
